substitutions:
  device_name: kroom-air-conditioner
  friendly_name: Haier Air Conditioner
  haier_uart_tx_pin: GPIO12
  haier_uart_rx_pin: GPIO13


esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: ESPHome device to make bridge between Hair Air conditioner and wirenboard mqtt
  on_boot:
    priority: -100
    then:
      - wait_until:
          mqtt.connected:
      - delay: 2s
      - script.execute: publish_static_topics

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

logger:

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

mqtt:
  broker: !secret mqtt_host
  port: !secret mqtt_port
  username: !secret mqtt_username
  password: !secret mqtt_password
  discovery: false
  reboot_timeout: 15min
  on_message:
    - topic: /devices/haier-${device_name}/controls/power/on
      then:
        - lambda: |-
            ESP_LOGI("/controls/power/on", "Power mode set to: %s", x.c_str());
            if (x == "1") {
              id(haier_ac).send_power_on_command();
            } else if (x == "0") {
              id(haier_ac).send_power_off_command();
            }
    - topic: /devices/haier-${device_name}/controls/mode/on
      then:
        - lambda: |-
            ESP_LOGI("/controls/climate/on", "Mode set to: %s", x.c_str());
            if (x == "1") {
              id(haier_ac).make_call().set_mode(CLIMATE_MODE_HEAT).perform();
            } else if (x == "2") {
              id(haier_ac).make_call().set_mode(CLIMATE_MODE_COOL).perform();
            } else if (x == "3") {
              id(haier_ac).make_call().set_mode(CLIMATE_MODE_HEAT_COOL).perform();
            } else if (x == "4") {
              id(haier_ac).make_call().set_mode(CLIMATE_MODE_DRY).perform();
            } else {
              id(haier_ac).make_call().set_mode(CLIMATE_MODE_FAN_ONLY).perform();
            }
    - topic: /devices/haier-${device_name}/controls/preset/on
      then:
        - lambda: |-
            ESP_LOGI("/controls/mode/on", "Preset set to: %s", x.c_str());
            if (x == "1") {
              id(haier_ac).make_call().set_preset(CLIMATE_PRESET_AWAY).perform();
            } else if (x == "2") {
              id(haier_ac).make_call().set_preset(CLIMATE_PRESET_BOOST).perform();
            } else if (x == "3") {
              id(haier_ac).make_call().set_preset(CLIMATE_PRESET_SLEEP).perform();
            } else {
              id(haier_ac).make_call().set_preset(CLIMATE_PRESET_NONE).perform();
            }
    - topic: /devices/haier-${device_name}/controls/fan/on
      then:
        - lambda: |-
            ESP_LOGI("/controls/fan/on", "Fan mode set to: %s", x.c_str());
            if (x == "2") {
              id(haier_ac).make_call().set_fan_mode(CLIMATE_FAN_LOW).perform();
            } else if (x == "3") {
              id(haier_ac).make_call().set_fan_mode(CLIMATE_FAN_MEDIUM).perform();
            } else if (x == "4") {
              id(haier_ac).make_call().set_fan_mode(CLIMATE_FAN_HIGH).perform();
            } else {
              id(haier_ac).make_call().set_fan_mode(CLIMATE_FAN_AUTO).perform();
            }
    - topic: /devices/haier-${device_name}/controls/ionization/on
      then:
        - lambda: |-
            bool mode = x == "1";
            id(haier_ac).set_health_mode(mode);
    - topic: /devices/haier-${device_name}/controls/fan_speed/on
      then:
        - lambda: |-
            ESP_LOGI("/controls/fan_speed/on", "Write Smart fan speed: %s", x.c_str());
            if (x == "2") {
              id(haier_ac).make_call().set_fan_mode(CLIMATE_FAN_LOW).perform();
            } else if (x == "3") {
              id(haier_ac).make_call().set_fan_mode(CLIMATE_FAN_MEDIUM).perform();
            } else if (x == "4") {
              id(haier_ac).make_call().set_fan_mode(CLIMATE_FAN_HIGH).perform();
            } else {
              id(haier_ac).make_call().set_fan_mode(CLIMATE_FAN_AUTO).perform();
            }
    - topic: /devices/haier-${device_name}/controls/vertical_swing/on
      then:
        - lambda: |-
            using esphome::haier::hon_protocol::VerticalSwingMode;
            ESP_LOGI("/controls/vertical_swing/on", "Write vertical vanes: %s", x.c_str());
            if (x=="1"){
              id(haier_ac).set_vertical_airflow(VerticalSwingMode::MAX_DOWN); 
            }else if(x=="2"){
              id(haier_ac).set_vertical_airflow(VerticalSwingMode::DOWN);
            }else if(x=="3"){
              id(haier_ac).set_vertical_airflow(VerticalSwingMode::HEALTH_DOWN);
            }else if(x=="4"){
              id(haier_ac).set_vertical_airflow(VerticalSwingMode::CENTER);
            }else if(x=="5"){
               id(haier_ac).set_vertical_airflow(VerticalSwingMode::HEALTH_UP);
            }else if(x=="6"){
               id(haier_ac).set_vertical_airflow(VerticalSwingMode::UP);
            }else if(x=="7"){
              id(haier_ac).set_vertical_airflow(VerticalSwingMode::MAX_UP);
            }else{
              id(haier_ac).set_vertical_airflow(VerticalSwingMode::AUTO); 
            }
    - topic: /devices/haier-${device_name}/controls/horizontal_swing/on
      then:
        - lambda: |-
            using esphome::haier::hon_protocol::HorizontalSwingMode;
            ESP_LOGI("/controls/horizontal_swing/on", "Write Horizontal vanes: %s", x.c_str());
            if (x=="1"){
              id(haier_ac).set_horizontal_airflow(HorizontalSwingMode::MAX_LEFT); 
            }else if(x=="2"){
              id(haier_ac).set_horizontal_airflow(HorizontalSwingMode::LEFT);
            }else if(x=="3"){
              id(haier_ac).set_horizontal_airflow(HorizontalSwingMode::CENTER);
            }else if(x=="4"){
              id(haier_ac).set_horizontal_airflow(HorizontalSwingMode::RIGHT);
            }else if(x=="5"){
               id(haier_ac).set_horizontal_airflow(HorizontalSwingMode::MAX_RIGHT);
            }else{
              id(haier_ac).set_horizontal_airflow(HorizontalSwingMode::AUTO); 
            }
    - topic: /devices/haier-${device_name}/controls/target_temperature/on
      then:
        - lambda: |-
            int temp = 18;
            sscanf(x.c_str(), "%d", &temp);
            id(haier_ac).make_call().set_target_temperature(temp * 1.0f).perform();
    - topic: /devices/haier-${device_name}/controls/swing/on
      then:
        - lambda: |-
            if (x == "0") {
              id(haier_ac).make_call().set_swing_mode(CLIMATE_SWING_OFF).perform();
            } else if (x == "1") {
              id(haier_ac).make_call().set_swing_mode(CLIMATE_SWING_BOTH).perform();
            } else if (x == "2") {
              id(haier_ac).make_call().set_swing_mode(CLIMATE_SWING_HORIZONTAL).perform();
            } else if (x == "3") {
              id(haier_ac).make_call().set_swing_mode(CLIMATE_SWING_VERTICAL).perform();
            }
  on_connect:
    then:
      - delay: 2s
      - script.execute: publish_static_topics

script:
  - id: publish_static_topics
    mode: restart
    then:
      - logger.log: "Publishing retained MQTT metadata"
      - mqtt.publish:
          topic: /devices/haier-${device_name}
          payload: "${device_name}"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/meta
          payload: >-
            {"driver":"haier-air-conditioner","title":{"en":"${device_name}"}}
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/meta/driver
          payload: "haier-air-conditioner"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/meta/name
          payload: "${device_name}"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/power/meta
          payload: >-
            {"order":1,"readonly":false,"title":{"en":"State","ru":"Состояние"},"type":"switch"}
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/power/meta/order
          payload: "1"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/power/meta/readonly
          payload: "0"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/power/meta/type
          payload: "switch"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/connected/meta
          payload: >-
            {"order":2,"readonly":true,"title":{"en":"Connected","ru":"Подключен"},"type":"switch"}
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/connected/meta/order
          payload: "2"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/connected/meta/readonly
          payload: "1"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/connected/meta/type
          payload: "switch"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/mode/meta
          payload: >-
            {"enum":{"1":{"en":"Heat","ru":"Обогрев"},"2":{"en":"Cool","ru":"Охлаждение"},"3":{"en":"Auto","ru":"Авто"},"4":{"en":"Dry","ru":"Осушение"},"5":{"en":"Fan","ru":"Вентиляция"}},"order":3,"readonly":false,"title":{"ru":"Режим"},"type":"value"}
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/mode/meta/order
          payload: "3"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/mode/meta/readonly
          payload: "0"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/mode/meta/type
          payload: "value"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/preset/meta
          payload: >-
            {"enum":{"1":{"en":"Away","ru":"Отсутствие"},"2":{"en":"Boost","ru":"Турбо"},"3":{"en":"Sleep","ru":"Сон"},"4":{"en":"None","ru":"Нет"}},"order":4,"readonly":false,"title":{"ru":"Предустановка"},"type":"value"}
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/preset/meta/order
          payload: "4"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/preset/meta/readonly
          payload: "0"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/preset/meta/type
          payload: "value"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/fan/meta
          payload: >-
            {"enum":{"1":{"en":"Auto","ru":"Автоматический"},"2":{"en":"Low","ru":"Слабый"},"3":{"en":"Medium","ru":"Средний"},"4":{"en":"High","ru":"Сильный"}},"order":5,"readonly":false,"title":{"ru":"Режим вентилятора"},"type":"value"}
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/fan/meta/order
          payload: "5"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/fan/meta/readonly
          payload: "0"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/fan/meta/type
          payload: "value"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/fan_speed/meta
          payload: >-
            {"enum":{"1":{"en":"Auto","ru":"Авто"},"2":{"en":"Low","ru":"Низкая"},"3":{"en":"Medium","ru":"Средняя"},"4":{"en":"High","ru":"Высокая"}},"order":6,"readonly":false,"title":{"ru":"Скорость вентилятора"},"type":"value"}
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/fan_speed/meta/order
          payload: "6"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/fan_speed/meta/readonly
          payload: "0"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/fan_speed/meta/type
          payload: "value"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/ionization/meta
          payload: >-
            {"order":7,"readonly":false,"title":{"en":"Ionization","ru":"Ионизация"},"type":"switch"}
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/ionization/meta/order
          payload: "7"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/ionization/meta/readonly
          payload: "0"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/ionization/meta/type
          payload: "switch"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/vertical_swing/meta
          payload: >-
            {"enum":{"0":{"en":"Auto","ru":"Авто"},"1":{"en":"-3","ru":"-3"},"2":{"en":"-2","ru":"-2"},"3":{"en":"-1","ru":"-1"},"4":{"en":"0","ru":"0"},"5":{"en":"1","ru":"1"},"6":{"en":"2","ru":"2"},"7":{"en":"3","ru":"3"}},"order":8,"readonly":false,"title":{"ru":"Вертикальное направление потока"},"type":"value"}
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/vertical_swing/meta/order
          payload: "8"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/vertical_swing/meta/readonly
          payload: "0"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/vertical_swing/meta/type
          payload: "value"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/horizontal_swing/meta
          payload: >-
            {"enum":{"0":{"en":"Auto","ru":"Авто"},"1":{"en":"-2","ru":"-2"},"2":{"en":"-1","ru":"-1"},"3":{"en":"0","ru":"0"},"4":{"en":"1","ru":"1"},"5":{"en":"2","ru":"2"}},"order":9,"readonly":false,"title":{"ru":"Горизонтальное направление потока"},"type":"value"}
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/horizontal_swing/meta/order
          payload: "9"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/horizontal_swing/meta/readonly
          payload: "0"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/horizontal_swing/meta/type
          payload: "value"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/swing/meta
          payload: >-
            {"enum":{"0":{"en":"OFF","ru":"Выключено"},"1":{"en":"Both","ru":"Оба направления"},"2":{"en":"Horizontal","ru":"Горизонтально"},"3":{"en":"Vertical","ru":"Вертикально"}},"order":10,"readonly":false,"title":{"en":"Swing","ru":"Качание"},"type":"value"}
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/swing/meta/order
          payload: "10"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/swing/meta/readonly
          payload: "0"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/swing/meta/type
          payload: "value"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/current_temperature/meta
          payload: >-
            {"order":11,"readonly":true,"title":{"en":"Current temperature","ru":"Текущая температура"},"type":"value"}
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/current_temperature/meta/order
          payload: "11"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/current_temperature/meta/readonly
          payload: "1"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/current_temperature/meta/type
          payload: "value"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/target_temperature/meta
          payload: >-
            {"enum":{"16":{"en":"16"},"17":{"en":"17"},"18":{"en":"18"},"19":{"en":"19"},"20":{"en":"20"},"21":{"en":"21"},"22":{"en":"22"},"23":{"en":"23"},"24":{"en":"24"},"25":{"en":"25"},"26":{"en":"26"},"27":{"en":"27"},"28":{"en":"28"},"29":{"en":"29"},"30":{"en":"30"}},"order":12,"readonly":false,"title":{"en":"Target temperature","ru":"Целевая температура"},"type":"value"}
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/target_temperature/meta/order
          payload: "12"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/target_temperature/meta/readonly
          payload: "0"
          retain: true
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/target_temperature/meta/type
          payload: "value"
          retain: true
uart:
  - id: haier_uart
    baud_rate: 9600
    parity: NONE
    stop_bits: 1
    tx_pin: ${haier_uart_tx_pin}
    rx_pin: ${haier_uart_rx_pin}

climate:
  - platform: haier
    id: haier_ac
    uart_id: haier_uart
    protocol: HON
    wifi_signal: true
    display: true
    supported_modes:
      - "OFF"
      - "HEAT_COOL"
      - "COOL"
      - "HEAT"
      - "DRY"
      - "FAN_ONLY"
    supported_swing_modes:
      - "OFF"
      - "VERTICAL"
      - "HORIZONTAL"
      - "BOTH"
    supported_presets:
      - "AWAY"
      - "BOOST"
      - "SLEEP"


binary_sensor:
  - platform: template
    id: haier_connected_sensor
    lambda: |-
      return id(haier_ac).valid_connection();
    on_state:
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/connected
          payload: !lambda |-
            return x ? "1" : "0";
          retain: true
  - platform: template
    id: haier_ionization_sensor
    lambda: |-
      return id(haier_ac).get_health_mode();
    on_state:
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/ionization
          payload: !lambda |-
            return x ? "1" : "0";
          retain: true

text_sensor:
  - platform: template
    id: haier_preset
    update_interval: 15s
    lambda: |-
      switch (id(haier_ac).preset.value_or(CLIMATE_PRESET_NONE)) {
      case CLIMATE_PRESET_AWAY: return std::string("1");
      case CLIMATE_PRESET_BOOST: return std::string("2");
      case CLIMATE_PRESET_SLEEP: return std::string("3");
      default: return std::string("4");
      }
    on_value:
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/preset
          payload: !lambda |-
            return x.c_str();
          retain: true
  - platform: template
    id: haier_fan_mode
    update_interval: 15s
    lambda: |-
      switch (id(haier_ac).fan_mode.value_or(CLIMATE_FAN_AUTO)) {
        case CLIMATE_FAN_LOW: return std::string("2");
        case CLIMATE_FAN_MEDIUM: return std::string("3");
        case CLIMATE_FAN_HIGH: return std::string("4");
        default: return std::string("1");
      }
    on_value:
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/fan
          payload: !lambda |-
            return x.c_str();
          retain: true
  - platform: template
    id: haier_mode
    update_interval: 15s
    lambda: |-
      switch (id(haier_ac).mode) {
        case CLIMATE_MODE_HEAT: return std::string("1"); 
        case CLIMATE_MODE_COOL: return std::string("2"); 
        case CLIMATE_MODE_HEAT_COOL: return std::string("3"); 
        case CLIMATE_MODE_DRY: return std::string("4"); 
        default: return std::string("5");
      }
    on_value:
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/mode
          payload: !lambda |-
            return x.c_str();
          retain: true

  - platform: template
    id: haier_vertical_swing
    update_interval: 15s
    lambda: |-
      using esphome::haier::hon_protocol::VerticalSwingMode;
      switch (id(haier_ac).get_vertical_airflow().value_or(VerticalSwingMode::CENTER)) {
        case VerticalSwingMode::MAX_DOWN: return std::string("1");
        case VerticalSwingMode::DOWN: return std::string("2");
        case VerticalSwingMode::HEALTH_DOWN: return std::string("3");
        case VerticalSwingMode::CENTER: return std::string("4");
        case VerticalSwingMode::HEALTH_UP: return std::string("5");
        case VerticalSwingMode::UP: return std::string("6");
      }
      return std::string("0");
    on_value:
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/vertical_swing
          payload: !lambda |-
            return x.c_str();
          retain: true

  - platform: template
    id: haier_horizontal_swing
    update_interval: 15s
    lambda: |-
      using esphome::haier::hon_protocol::HorizontalSwingMode;
      switch (id(haier_ac).get_horizontal_airflow().value_or(HorizontalSwingMode::CENTER)) {
        case HorizontalSwingMode::MAX_LEFT: return std::string("1");
        case HorizontalSwingMode::LEFT: return std::string("2");
        case HorizontalSwingMode::CENTER: return std::string("3");
        case HorizontalSwingMode::RIGHT: return std::string("4");
        case HorizontalSwingMode::MAX_RIGHT: return std::string("5");
        default: return std::string("0");
      }
    on_value:
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/horizontal_swing
          payload: !lambda |-
            return x.c_str();
          retain: true
  - platform: template
    id: haier_swing
    update_interval: 15s
    lambda: |-
      switch (id(haier_ac).swing_mode) {
      case CLIMATE_SWING_BOTH: return std::string("1");
      case CLIMATE_SWING_HORIZONTAL: return std::string("2");
      case CLIMATE_SWING_VERTICAL: return std::string("3");
      default: return std::string("0");
      }
    on_value:
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/swing
          payload: !lambda |-
            return x.c_str();
          retain: true
  - platform: template
    id: haier_current_temperature
    update_interval: 15s
    lambda: |-
      float temp = id(haier_ac).current_temperature;
      char buffer[16];
      snprintf(buffer, sizeof(buffer), "%.1f", temp);
      return std::string(buffer);
    on_value:
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/current_temperature
          payload: !lambda |-
            return x.c_str();
          retain: true
  - platform: template
    id: haier_target_temperature
    update_interval: 15s
    lambda: |-
      float temp = id(haier_ac).target_temperature;
      char buffer[16];
      snprintf(buffer, sizeof(buffer), "%.1f", temp);
      return std::string(buffer);
    on_value:
      - mqtt.publish:
          topic: /devices/haier-${device_name}/controls/target_temperature
          payload: !lambda |-
            return x.c_str();
          retain: true
